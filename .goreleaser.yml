version: 2
builds:
  - id: mcp
    main: ./cmd/server
    binary: solarsage-mcp
    env:
      - CGO_ENABLED=1
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
  - id: api
    main: ./cmd/api
    binary: solarsage-api
    env:
      - CGO_ENABLED=1
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - format: tar.gz

changelog:
  sort: asc
  filters:
    exclude:
      - "^chore:"
      - "^docs:"
