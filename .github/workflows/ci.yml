name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build Swiss Ephemeris
        run: |
          cd third_party/swisseph
          make libswe.a

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: Coverage
        run: make test-cover
